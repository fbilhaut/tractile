name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      hf_model:
        description: "HuggingFace model repo"
        default: "Alibaba-NLP/gte-multilingual-base"
      hf_revision:
        description: "HuggingFace revision (branch, tag, or PR ref)"
        default: "refs/pr/23"

env:
  IMAGE: ghcr.io/fbilhaut/tractile

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest
          build-args: |
            HF_MODEL=${{ inputs.hf_model || 'Alibaba-NLP/gte-multilingual-base' }}
            HF_REVISION=${{ inputs.hf_revision || 'refs/pr/23' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
